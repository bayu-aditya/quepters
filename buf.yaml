version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # The downstream gRPC contract is externally fixed and cannot follow these
    # conventions. See proto/quepters/quepters.proto for details.
    - PACKAGE_VERSION_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
